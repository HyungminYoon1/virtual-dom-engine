<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Week5 React-like Runtime</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf2;
      --ink: #1f1a14;
      --muted: #6f6253;
      --accent: #c46d1a;
      --accent-strong: #9f5209;
      --border: #e6d6c1;
      --shadow: 0 18px 40px rgba(80, 53, 21, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top, rgba(196, 109, 26, 0.12), transparent 32rem),
        linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      color: var(--ink);
    }

    #app {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .app-shell {
      display: grid;
      gap: 24px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-strong);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 4vw, 48px);
      line-height: 1.05;
    }

    .intro,
    .status-line,
    .field-label {
      color: var(--muted);
      line-height: 1.6;
    }

    .panel {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
    }

    button {
      width: fit-content;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary-button {
      background: var(--accent);
      color: white;
    }

    .secondary-button {
      background: #ead9c7;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
