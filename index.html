<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Week5 React-like Runtime</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 250, 242, 0.92);
      --panel-strong: #fff7ed;
      --ink: #1f1a14;
      --muted: #6f6253;
      --accent: #c46d1a;
      --accent-strong: #9f5209;
      --accent-soft: #f2d1b0;
      --border: #e6d6c1;
      --shadow: 0 18px 40px rgba(80, 53, 21, 0.12);
      --success: #356a4f;
      --danger: #8e4d2c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top, rgba(196, 109, 26, 0.12), transparent 32rem),
        linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
      color: var(--ink);
    }

    #app {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .app-shell {
      display: grid;
      gap: 22px;
    }

    .hero-card,
    .panel-card,
    .insight-panel,
    .board-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-strong);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .hero-title {
      margin: 0 0 12px;
      font-size: clamp(32px, 4vw, 48px);
      line-height: 1.05;
    }

    .hero-description,
    .field-label,
    .routine-meta,
    .board-section-header p,
    .panel-heading p,
    .insight-empty {
      color: var(--muted);
      line-height: 1.6;
    }

    .hero-card {
      display: grid;
      gap: 18px;
    }

    .hero-stats,
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .stat-card,
    .insight-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel-strong);
      padding: 16px;
    }

    .stat-label,
    .insight-label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value,
    .insight-value {
      font-size: 24px;
      line-height: 1.2;
    }

    .progress-block {
      display: grid;
      gap: 8px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .progress-track {
      height: 14px;
      border-radius: 999px;
      background: #ecdcc8;
      overflow: hidden;
    }

    .progress-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #e39642);
      transition: width 220ms ease;
    }

    .panel-card,
    .insight-panel,
    .board-section {
      display: grid;
      gap: 12px;
    }

    .panel-heading h2,
    .board-section-header h2,
    .category-summary h3 {
      margin: 0;
    }

    .panel-heading p,
    .board-section-header p {
      margin: 0;
    }

    .composer-form,
    .filter-grid {
      display: grid;
      gap: 14px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
    }

    button {
      width: fit-content;
      padding: 12px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary-button {
      background: var(--accent);
      color: white;
    }

    .secondary-button {
      background: #ead9c7;
      color: var(--ink);
    }

    .ghost-button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
    }

    .board-layout {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card-grid {
      display: grid;
      gap: 12px;
    }

    .routine-card {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #fff;
      padding: 16px;
      display: grid;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(80, 53, 21, 0.08);
      animation: card-enter 240ms ease;
      transition: transform 140ms ease, opacity 180ms ease, box-shadow 180ms ease;
    }

    .routine-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(80, 53, 21, 0.12);
    }

    .routine-card.is-done {
      opacity: 0.72;
      transform: scale(0.99);
    }

    .routine-card-high {
      border-color: rgba(196, 109, 26, 0.45);
    }

    .routine-topline,
    .routine-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .routine-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-category {
      background: #f2ecdf;
      color: var(--ink);
    }

    .badge-priority-high {
      background: #f7d0b8;
      color: #8c4a11;
    }

    .badge-priority-medium {
      background: #f6e7b9;
      color: #7d620f;
    }

    .badge-priority-low {
      background: #dcebd8;
      color: var(--success);
    }

    .empty-state {
      margin: 0;
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--border);
      background: #fffdf9;
      color: var(--muted);
    }

    .category-summary ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .board-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      #app {
        padding: 24px 16px 40px;
      }

      .field-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
